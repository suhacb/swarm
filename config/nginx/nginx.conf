worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Don't leak the nginx version in the Server header or default error
    # pages — no reason to hand a would-be attacker a version to look up
    # known CVEs for.
    server_tokens off;

    sendfile   on;
    keepalive_timeout 65;

    client_max_body_size 50m;

    # Mozilla "Intermediate" cipher profile — TLS 1.2/1.3 only (set per
    # vhost already), strong ciphers only. Both apps already set their own
    # security headers (HSTS, X-Frame-Options, nosniff) well, so those
    # aren't duplicated here.
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Keycloak (especially the admin console) sends larger headers/cookies
    # than nginx's defaults expect.
    proxy_buffer_size       128k;
    proxy_buffers           4 256k;
    proxy_busy_buffers_size 256k;

    # Rate limiting. "general" protects GitLab's tight memory budget from
    # bot/scanner traffic — the box has no room to spare for a flood of
    # cheap requests. "auth" is tighter, applied only to Keycloak's actual
    # login form submission, as defense in depth alongside its own
    # brute-force lockout (scripts/harden-keycloak-brute-force.sh).
    # Real firewall/network-level protection is out of scope here by
    # design — that's handled upstream of this box.
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=2r/s;
    # registry.suhac.eu is machine-to-machine only (docker/git CLI, never a
    # browser) and every meaningful request already carries a per-request
    # JWT scoped to a specific repo+action — that auth check is the real
    # abuse boundary here, not a requests/sec cap sized for human browsing.
    # A single multi-layer `docker push` legitimately fires many rapid
    # calls per blob (exists-check, upload-start, chunk(s), finalize) and
    # blew through general's burst=20 within ~2s (confirmed live 2026-07-
    # 14: proxy_nginx itself 503'd a princess_backend push and an unrelated
    # princess_frontend manifest lookup at the same moment — same shared
    # zone, keyed by $binary_remote_addr, which collapses every container's
    # NAT-hairpinned traffic onto Docker Desktop's one gateway IP).
    limit_req_zone $binary_remote_addr zone=registry:10m rate=100r/s;

    include /etc/nginx/conf.d/*.conf;
}
