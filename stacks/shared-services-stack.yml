# Shared, swarm-level Qdrant/ZincSearch/Garage — run once, used by any
# service that needs a vector index, full-text index, or S3-compatible
# object storage, rather than a dedicated instance each (same reasoning as
# the shared Postgres server in data-stack.yml).
#
# Qdrant/ZincSearch join public-ingress too (in addition to app-mesh) so
# Nginx can reverse-proxy their admin UIs at qdrant.suhac.eu/zinc.suhac.eu
# — gated by oauth2-proxy below, not left open. None of them have native
# OIDC support (unlike pgAdmin), hence the shared gatekeeper. Internal
# backends (e.g. princess) still reach them directly via app-mesh/service
# name — public-ingress membership doesn't change that path at all.
# Garage itself (the S3 engine) stays app-mesh only; only its web UI
# (garage-webui, below) needs public-ingress.
#
# Naming convention (enforced by the CONSUMING app's own config, not by
# anything server-side except Garage's bucket/key scoping — see
# scripts/setup-garage.sh): production names are bare, every other
# environment is prefixed with its env name. For princess specifically:
#   - Garage buckets: princess, staging-princess, e2e-princess, test-princess
#     (HYPHENS — confirmed live that Garage enforces S3 bucket-naming
#     rules, which reject underscores; every other name below is
#     unaffected and keeps this repo's usual underscore convention)
#   - Qdrant collections: princess_*, staging_princess_*, e2e_princess_*, test_princess_*
#   - ZincSearch indices: same prefix pattern as Qdrant
#
# NEITHER zincsearch, garage, NOR oauth2-proxy's images have a shell
# (confirmed live — all are minimal Go/Rust static-binary images, no
# /bin/sh, no busybox). That rules out the entrypoint-wrapper trick used
# elsewhere in this repo (Keycloak/GitLab) to turn a mounted Docker
# secret file into an env var, AND rules out CMD-SHELL healthchecks
# (which also need a shell). See docs/DEPLOY.md's Phase 3 section for how
# each service's credentials are actually delivered instead — oauth2-proxy
# is the easy case: it has native --client-secret-file/--cookie-secret-file
# flags, no workaround needed at all.
#
# Access model for the admin UIs (qdrant/zinc/garage-webui): ONE shared
# oauth2-proxy instance authenticates against Keycloak; each vhost in
# config/nginx/conf.d/infra-tools.conf enforces its OWN required group
# via oauth2-proxy's per-request `allowed_groups` query param on the
# auth_request URI (checked inside oauth2-proxy itself, purpose-built
# for this Nginx-subrequest pattern) — deliberately not this proxy's own
# global --allowed-group (which would be one shared group for all three,
# not per-tool isolation), and NOT an nginx-side `if` on the
# X-Auth-Request-Groups header (tried first — silently 403'd every
# request due to nginx's if-runs-before-auth_request phase ordering, see
# infra-tools.conf's comment for the full story). pgAdmin is the
# exception: it keeps its own native OIDC from Phase 3, gated the same
# way via a groups check in its own config instead.
#
# Tracked in https://github.com/suhacb/swarm/issues/8 (supersedes #4).
networks:
  public-ingress:
    external: true
  app-mesh:
    external: true

secrets:
  zincsearch_admin_password:
    external: true
  oauth2_proxy_client_secret:
    external: true
  oauth2_proxy_cookie_secret:
    external: true

services:
  qdrant:
    image: qdrant/qdrant:v1.13.3
    networks:
      - public-ingress
      - app-mesh
    volumes:
      - /opt/swarm-data/qdrant:/qdrant/storage
    healthcheck:
      # This image's /bin/sh is NOT bash (confirmed live — dash-like, no
      # /dev/tcp support: "Directory nonexistent"). bash does exist, just
      # at /usr/bin/bash — invoke it explicitly via CMD, not CMD-SHELL
      # (which always wraps in /bin/sh).
      test: ["CMD", "/usr/bin/bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/6333 && printf 'GET /readyz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 384M
      restart_policy:
        condition: on-failure
        delay: 10s
      placement:
        constraints:
          - node.role == manager

  zincsearch:
    image: public.ecr.aws/zinclabs/zincsearch:0.4.10
    networks:
      - public-ingress
      - app-mesh
    environment:
      ZINC_FIRST_ADMIN_USER: admin
      # No shell in this image to translate a mounted Docker secret file
      # into an env var, and ZincSearch has no *_FILE-style convention for
      # this setting — so the value comes from docker-stack-deploy's own
      # ${VAR} interpolation (confirmed live: it substitutes from the
      # deploying shell's environment, same as docker-compose) rather than
      # a Docker secret. See docs/DEPLOY.md for the export-then-deploy step.
      ZINC_FIRST_ADMIN_PASSWORD: ${ZINC_FIRST_ADMIN_PASSWORD}
      ZINC_DATA_PATH: /data
    volumes:
      - /opt/swarm-data/zincsearch:/data
    # No healthcheck: no shell and no curl/wget/nc inside this image to
    # probe with. restart_policy below still recovers a genuine crash.
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 10s
      placement:
        constraints:
          - node.role == manager

  garage:
    image: dxflrs/garage:v2.3.0
    networks:
      - app-mesh
    entrypoint: ["/garage"]
    command: ["server", "--single-node"]
    volumes:
      # A fully-rendered config, not a template with runtime substitution
      # (no shell in this image to do that) — generated ONCE on the host
      # from config/garage/garage.toml.template and never committed, same
      # "copied, not bind-mounted, secrets live on the host only" pattern
      # already used for gitlab.rb. See docs/DEPLOY.md's Phase 3 section.
      - /opt/swarm-data/garage/garage.toml:/etc/garage.toml:ro
      - /opt/swarm-data/garage/meta:/var/lib/garage/meta
      - /opt/swarm-data/garage/data:/var/lib/garage/data
    # No healthcheck: no shell/tools inside this image to probe with.
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 10s
      placement:
        constraints:
          - node.role == manager

  garage-webui:
    # Third-party community project (not maintained by the Garage team) —
    # Garage itself deliberately ships no web GUI. Flagged, proceeding on
    # explicit instruction.
    image: khairul169/garage-webui:latest
    networks:
      - public-ingress
      - app-mesh
    environment:
      API_BASE_URL: "http://garage:3903"
      S3_ENDPOINT_URL: "http://garage:3900"
    volumes:
      # Same rendered config Garage itself uses (has the admin_token
      # garage-webui needs) — read-only, matches the project's own
      # documented docker-compose example.
      - /opt/swarm-data/garage/garage.toml:/etc/garage.toml:ro
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 150M
      restart_policy:
        condition: on-failure
        delay: 10s
      placement:
        constraints:
          - node.role == manager

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.3
    networks:
      - public-ingress
      - app-mesh
    secrets:
      - oauth2_proxy_client_secret
      - oauth2_proxy_cookie_secret
    environment:
      OAUTH2_PROXY_PROVIDER: keycloak-oidc
      OAUTH2_PROXY_OIDC_ISSUER_URL: https://keycloak.suhac.eu/realms/suhacb
      OAUTH2_PROXY_CLIENT_ID: oauth2-proxy
      OAUTH2_PROXY_CLIENT_SECRET_FILE: /run/secrets/oauth2_proxy_client_secret
      OAUTH2_PROXY_COOKIE_SECRET_FILE: /run/secrets/oauth2_proxy_cookie_secret
      # No shell in this image (confirmed live) — unlike Garage/ZincSearch,
      # not an issue here at all: oauth2-proxy has native *_FILE flags for
      # both secrets, so no entrypoint wrapper is needed in the first
      # place.
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_UPSTREAMS: "static://202"
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      OAUTH2_PROXY_OIDC_GROUPS_CLAIM: groups
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      # Deliberately NOT setting OAUTH2_PROXY_ALLOWED_GROUPS: this proxy
      # only authenticates (any suhacb-realm user gets a session); Nginx
      # is what authorizes, per-vhost, off the X-Auth-Request-Groups
      # header this flag causes oauth2-proxy to return — see
      # config/nginx/conf.d/infra-tools.conf.
      #
      # One shared cookie across all three hostnames for convenience (log
      # in once) — authorization is still enforced independently per
      # vhost regardless, so sharing the session doesn't share access.
      OAUTH2_PROXY_COOKIE_DOMAINS: ".suhac.eu"
      OAUTH2_PROXY_WHITELIST_DOMAINS: ".suhac.eu"
      # --reverse-proxy trusts X-Forwarded-* headers from ANY IP by
      # default (confirmed live — oauth2-proxy warns about this on
      # startup) — only Nginx should ever be able to set those. Scoped to
      # the two overlay networks this service is actually on, not just
      # left wide open. NOTE the env var is _IPS (plural, matching the
      # Go struct's `cfg:"trusted_proxy_ips"` tag) — the singular
      # OAUTH2_PROXY_TRUSTED_PROXY_IP (matching the --trusted-proxy-ip
      # flag name) is silently ignored, confirmed live.
      OAUTH2_PROXY_TRUSTED_PROXY_IPS: "10.0.1.0/24,10.0.2.0/24"
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 100M
      restart_policy:
        condition: on-failure
        delay: 10s
      placement:
        constraints:
          - node.role == manager
