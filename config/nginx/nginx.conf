# Workers run as root (not the image default `nginx` user) so they can read
# /etc/letsencrypt/live/suhac.eu/privkey.pem, which is root-owned mode 600 on
# the host. Container isolation is the security boundary here instead of the
# usual privilege drop. Proper fix later: have certbot's renewal deploy-hook
# copy certs to a location readable by a non-root user, then drop this.
user root;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile   on;
    keepalive_timeout 65;

    client_max_body_size 50m;

    # Keycloak (especially the admin console) sends larger headers/cookies
    # than nginx's defaults expect.
    proxy_buffer_size       128k;
    proxy_buffers           4 256k;
    proxy_busy_buffers_size 256k;

    include /etc/nginx/conf.d/*.conf;
}
