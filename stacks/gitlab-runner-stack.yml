# GitLab Runner, Docker executor. The runner manager process itself has no
# persistent footprint beyond config.toml — every CI/CD job runs in its own
# ephemeral sibling container, created via the host's Docker socket (not
# Docker-in-Docker), and is removed once the job finishes.
#
# ci-mesh is the only network this needs: it's attachable (unlike the tiered
# production networks), it's where nginx advertises gitlab.suhac.eu and
# registry.suhac.eu for both the manager and every job container to resolve,
# and job containers reach it via docker.network_mode below, not by joining
# any Swarm service network.
#
# TWO [[runners]] blocks live in the one persisted config.toml (added
# 2026-07-14, not scripted in this file's bootstrap command below — that
# only registers the FIRST block if config.toml doesn't exist yet):
#   - tags: docker, swarm-homelab — the original runner, NO docker.sock in
#     its own [runners.docker].volumes. Used by ordinary test/build jobs
#     (e.g. princess_backend's `composer install` + test suite). Job
#     containers here have zero host Docker access, on purpose — a
#     compromised/malicious dependency pulled in by a test job has no path
#     to the swarm host.
#   - tags: swarm-deploy — project-scoped to princess_backend (id=42), DOES
#     have docker.sock mounted into its job containers, so `docker service
#     update ...` can reach the swarm manager. Only jobs explicitly tagged
#     `swarm-deploy` in .gitlab-ci.yml get this access. See docs/DEPLOY.md.
# If /opt/swarm-data/gitlab-runner/config is ever lost, re-register both:
# the first via this file's own bootstrap command, the second via
# `POST /api/v4/user/runners` (runner_type=project_type, project_id=42,
# tag_list=swarm-deploy, run_untagged=false, locked=true) followed by
# `gitlab-runner register` with the returned token (no --tag-list/--locked
# flags — those are server-side now with the glrt- token flow), then strip
# docker.sock from the first block's volumes the same way.
networks:
  ci-mesh:
    external: true

secrets:
  gitlab_runner_token:
    external: true

services:
  gitlab-runner:
    image: gitlab/gitlab-runner:v19.1.1
    networks:
      - ci-mesh
    secrets:
      - gitlab_runner_token
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        if [ ! -f /etc/gitlab-runner/config.toml ]; then
          gitlab-runner register --non-interactive \
            --url "https://gitlab.suhac.eu/" \
            --token "$$(cat /run/secrets/gitlab_runner_token)" \
            --executor docker \
            --docker-image "docker:24-cli" \
            --docker-network-mode "ci-mesh" \
            --docker-volumes "/var/run/docker.sock:/var/run/docker.sock" \
            --docker-memory "1g" \
            --request-concurrency 2
        fi
        sed -i 's/^concurrent = .*/concurrent = 1/' /etc/gitlab-runner/config.toml
        exec gitlab-runner run
    volumes:
      # Job containers are created as siblings on the HOST's Docker daemon,
      # not nested inside this container — same socket-mount pattern as
      # every other "runner talks to Docker" setup, no privileged DinD.
      - /var/run/docker.sock:/var/run/docker.sock
      # config.toml persists here across container recreation so `register`
      # above only ever runs once, the same idempotent-if-missing pattern
      # used by scripts/setup-gitlab-keycloak.sh.
      - /opt/swarm-data/gitlab-runner/config:/etc/gitlab-runner
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          # The manager itself just polls for jobs and shells out to Docker;
          # actual job resource usage is bounded separately per job container
          # via --docker-memory above.
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 10s
      placement:
        constraints:
          - node.role == manager
