# Shared by every vhost gated through the oauth2-proxy gatekeeper
# (config/nginx/conf.d/infra-tools.conf). Only the sign_in/callback/etc.
# path is shared here — the actual `/oauth2/auth` check location is NOT
# shared: it must live in each vhost individually with its own
# `allowed_groups` value baked into the proxy_pass target (see
# infra-tools.conf's header comment for why `auth_request /oauth2/auth
# ?allowed_groups=...;` doesn't work — the directive doesn't parse an
# inline query string, it percent-encodes the literal `?` into the path).
# Doesn't declare its own `resolver` — each including vhost already has
# one; declaring it twice in the same server block is redundant.

location /oauth2/ {
    set $upstream_oauth2_proxy oauth2-proxy:4180;
    proxy_pass http://$upstream_oauth2_proxy;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
