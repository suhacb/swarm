# princess: Angular SPA (separate princess_frontend repo, id=75) + Laravel
# API (princess_backend repo, id=42), prod + staging. Real images now exist
# for princess_backend (see docs/DEPLOY.md); princess_frontend's own images
# don't yet, so those two services will still fail-to-pull until that
# repo's own pipeline exists — expected gap, not a bug to chase.
#
# princess_backend ships as TWO images (docker/nginx + docker/php in their
# repo), not one — nginx speaks HTTP, php-fpm speaks FastCGI only. This
# stack therefore has THREE princess_backend-related services per
# environment, not two:
#   - princess-backend(-staging): their nginx image. This is the thing
#     config/nginx/conf.d/princess.conf's `location ^~ /api/` block
#     proxies to, at apps_princess-backend:8080 — their nginx.conf
#     template listens on 8080, not 80 (confirmed live 2026-07-14: a
#     healthcheck AND princess.conf's proxy_pass both hardcoded :80,
#     neither ever reached the container at all despite it running
#     perfectly healthily — see project-nginx-registry-rate-limit memory's
#     sibling incident for the parallel php-fpm healthcheck mistake).
#     public-ingress (swarm Nginx reaches it) + app-mesh (it reaches
#     php-fpm over FastCGI). No app secrets — it's just a reverse proxy,
#     the Laravel app config lives one hop further in.
#   - princess-backend-fpm(-staging): their php image (php-fpm). Purely
#     internal — app-mesh (Keycloak/Garage/Qdrant/ZincSearch, and reached
#     BY the nginx service above) + data-mesh (Postgres). Deliberately
#     NOT on public-ingress: nothing external should ever reach php-fpm
#     directly, and it doesn't speak HTTP anyway.
#   - princess-frontend(-staging): the separate Angular SPA. public-ingress
#     only — the browser talks to it directly, and swarm Nginx's `location
#     /` block proxies to it. Do NOT let princess_backend's own pipeline
#     deploy anything here — this name is reserved for the id=75 repo.
#     (This used to collide: princess_backend's deploy was targeting this
#     exact name with its OWN nginx image before the fix below.)
#
# E2E has no separate deployment: the frontend's E2E suite hits the
# staging backend with an X-E2E-Token header, and the app's own
# E2eAuth middleware (app/Http/Middleware/E2eAuth.php) transparently
# switches the request onto the isolated e2e_princess database.
#
# Tracked in https://github.com/suhacb/swarm/issues/8 (supersedes #5).
networks:
  public-ingress:
    external: true
  app-mesh:
    external: true
  data-mesh:
    external: true

secrets:
  princess_app_key:
    external: true
  princess_app_key_staging:
    external: true
  princess_db_password:
    external: true
  princess_keycloak_client_secret:
    external: true
  princess_test_keycloak_client_secret:
    external: true
  princess_garage_key_id:
    external: true
  princess_garage_secret_key:
    external: true
  garage_admin_token:
    external: true
  onlyoffice_jwt_secret:
    external: true
  zincsearch_admin_password:
    external: true

services:
  princess-backend:
    # Their nginx image — the HTTP-speaking half. Real registry path
    # (project id=42's own CI pushes here); tag left at :latest as the
    # bootstrap value only — their deploy job overwrites this with an
    # immutable main-<short-sha> tag on every real deploy.
    image: registry.suhac.eu/suhacb/princess_backend/nginx:latest
    networks:
      - public-ingress
      - app-mesh
    environment:
      # Their own nginx.conf needs to fastcgi_pass here — coordinate the
      # exact expected env var name with the princess_backend team if
      # their config doesn't already read this one.
      PHP_FPM_HOST: princess-backend-fpm:9000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 64M
      restart_policy:
        condition: on-failure
        delay: 10s
      placement:
        constraints:
          - node.role == manager

  princess-backend-fpm:
    # Their php-fpm image — internal only, no public-ingress. Everything
    # that used to live on the combined "princess-backend" service (DB,
    # Keycloak, Garage) belongs here now, not on the nginx half.
    image: registry.suhac.eu/suhacb/princess_backend/php:latest
    networks:
      - app-mesh
      - data-mesh
    # Their config/database.php etc. read plain env('DB_PASSWORD') and
    # friends directly — no *_FILE convention, confirmed via their actual
    # source (config/database.php, .env.example). Confirmed LIVE 2026-07-15
    # that this was silently broken: DB_PASSWORD was never set as an env
    # var (only mounted as a secret FILE, which nothing reads), so every
    # real DB query failed with "no password supplied" despite the app
    # otherwise looking healthy — /api/health apparently never exercises
    # the DB. This wrapper translates every secret this app actually reads
    # into the literal env var it expects, then hands off to their own
    # entrypoint.sh (which still runs, e.g. config:cache — see their
    # Dockerfile's own comment on why that can't be baked in at build time).
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        export APP_KEY="$$(cat /run/secrets/princess_app_key)" &&
        export DB_PASSWORD="$$(cat /run/secrets/princess_db_password)" &&
        export KEYCLOAK_CLIENT_SECRET="$$(cat /run/secrets/princess_keycloak_client_secret)" &&
        export GARAGE_ACCESS_KEY_ID="$$(cat /run/secrets/princess_garage_key_id)" &&
        export GARAGE_SECRET_ACCESS_KEY="$$(cat /run/secrets/princess_garage_secret_key)" &&
        export GARAGE_ADMIN_TOKEN="$$(cat /run/secrets/garage_admin_token)" &&
        export ONLYOFFICE_JWT_SECRET="$$(cat /run/secrets/onlyoffice_jwt_secret)" &&
        exec /usr/local/bin/entrypoint.sh php-fpm -F
    environment:
      APP_NAME: princess_backend
      APP_ENV: production
      APP_URL: https://princess.suhac.eu
      DB_CONNECTION: pgsql
      DB_HOST: data_postgres
      DB_PORT: "5432"
      DB_DATABASE: princess
      DB_USERNAME: princess
      # SANCTUM_STATEFUL_DOMAINS: no scheme, comma-separated, per their own
      # .env.example comment — confirmed via config/sanctum.php.
      SANCTUM_STATEFUL_DOMAINS: princess.suhac.eu
      # APP_FRONTEND_URL: config/cors.php builds the allowed CORS origin as
      # literally env('APP_FRONTEND_URL').':'.env('APP_FRONTEND_PORT') — an
      # unconditional string concatenation. On a standard-port HTTPS origin
      # (no explicit port, which is what real browsers send in the Origin
      # header), this ALWAYS produces a trailing ":" or ":<wrong port>" that
      # can never exactly match — confirmed live 2026-07-15 (backend team
      # saw "access-control-allow-origin: :" with both vars empty). No
      # value set here fixes this correctly; it's a code-level bug in
      # cors.php's string-concatenation approach, not an infra config gap —
      # flagged back to the backend team rather than worked around here.
      # Their own .gitlab-ci.yml already defines an unused CORS_ALLOWED_ORIGINS
      # var that cors.php doesn't read, which may be the intended fix.
      APP_FRONTEND_URL: https://princess.suhac.eu
      AUTH_DRIVER: keycloak
      KEYCLOAK_BASE_URL: https://keycloak.suhac.eu
      KEYCLOAK_REALM: suhacb
      KEYCLOAK_CLIENT_ID: princess-client
      KEYCLOAK_REDIRECT_URI: https://princess.suhac.eu/api/auth/callback
      KEYCLOAK_JWKS_CACHE_TTL: "3600"
      AWS_ENDPOINT: http://shared-services_garage:3900
      GARAGE_REGION: garage
      GARAGE_ADMIN_URL: http://shared-services_garage:3903
      GARAGE_S3_BUCKET_PREFIX: princess
      GARAGE_TEMPLATES_BUCKET: princess-templates
      # GARAGE_PUBLIC_ENDPOINT deliberately left unset — DocumentVersionController
      # streams through the backend rather than a presigned URL (see docs/DEPLOY.md).
      ONLYOFFICE_URL: http://shared-services_onlyoffice
      # ONLYOFFICE_PUBLIC_URL / ONLYOFFICE_CALLBACK_BASE_URL: not set yet —
      # OnlyOffice has no public hostname (deliberate, internal-only), and
      # it's not yet decided how document editing is meant to work end-to-end
      # given that. Needs a decision before this is wired up, not a guess.
      # QDRANT_*/ZINC_*: NOT in their .env.example's canonical variable
      # checklist as of 2026-07-15 — currently unused by the app's actual
      # code as far as confirmed. Left set here in case a future feature
      # reads them; don't assume vector/full-text search works end-to-end
      # just because these are present.
      QDRANT_URL: http://shared-services_qdrant:6333
      QDRANT_COLLECTION_PREFIX: princess
      ZINC_URL: http://shared-services_zincsearch:4080
      ZINC_INDEX_PREFIX: princess
      ZINC_USER: admin
    secrets:
      - princess_app_key
      - princess_db_password
      - princess_keycloak_client_secret
      - princess_garage_key_id
      - princess_garage_secret_key
      - garage_admin_token
      - onlyoffice_jwt_secret
      - zincsearch_admin_password
    # No healthcheck: confirmed live their image has no /bin/bash (Alpine-
    # based), and a guessed-wrong healthcheck actively caused Swarm to kill
    # and reschedule an otherwise-healthy, ready-to-serve php-fpm process 5
    # times in ~90s (5 straight OCI exec failures -> marked unhealthy ->
    # rescheduled). Same "no shell/tools to probe with" situation as
    # Garage/ZincSearch elsewhere in this repo — restart_policy below
    # covers a genuine crash without a healthcheck actively fighting it.
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 448M
      restart_policy:
        condition: on-failure
        delay: 10s
      placement:
        constraints:
          - node.role == manager

  princess-backend-staging:
    image: registry.suhac.eu/suhacb/princess_backend/nginx:latest
    networks:
      - public-ingress
      - app-mesh
    environment:
      PHP_FPM_HOST: princess-backend-fpm-staging:9000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 64M
      restart_policy:
        condition: on-failure
        delay: 10s
      placement:
        constraints:
          - node.role == manager

  princess-backend-fpm-staging:
    image: registry.suhac.eu/suhacb/princess_backend/php:latest
    networks:
      - app-mesh
      - data-mesh
    # See princess-backend-fpm's comment above for why this wrapper exists:
    # their app reads plain env vars (DB_PASSWORD etc.), not secret files.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        export APP_KEY="$$(cat /run/secrets/princess_app_key_staging)" &&
        export DB_PASSWORD="$$(cat /run/secrets/princess_db_password)" &&
        export KEYCLOAK_CLIENT_SECRET="$$(cat /run/secrets/princess_test_keycloak_client_secret)" &&
        export GARAGE_ACCESS_KEY_ID="$$(cat /run/secrets/princess_garage_key_id)" &&
        export GARAGE_SECRET_ACCESS_KEY="$$(cat /run/secrets/princess_garage_secret_key)" &&
        export GARAGE_ADMIN_TOKEN="$$(cat /run/secrets/garage_admin_token)" &&
        export ONLYOFFICE_JWT_SECRET="$$(cat /run/secrets/onlyoffice_jwt_secret)" &&
        exec /usr/local/bin/entrypoint.sh php-fpm -F
    environment:
      APP_NAME: princess_backend
      APP_ENV: staging
      APP_URL: https://staging.princess.suhac.eu
      DB_CONNECTION: pgsql
      DB_HOST: data_postgres
      DB_PORT: "5432"
      DB_DATABASE: stage_princess
      DB_USERNAME: princess
      # See princess-backend-fpm's comment above re: SANCTUM_STATEFUL_DOMAINS
      # and APP_FRONTEND_URL / the cors.php string-concatenation bug — same
      # caveats apply, just the staging hostname.
      SANCTUM_STATEFUL_DOMAINS: staging.princess.suhac.eu
      APP_FRONTEND_URL: https://staging.princess.suhac.eu
      AUTH_DRIVER: keycloak
      KEYCLOAK_BASE_URL: https://keycloak.suhac.eu
      KEYCLOAK_REALM: princess-test
      KEYCLOAK_CLIENT_ID: princess-client
      KEYCLOAK_REDIRECT_URI: https://staging.princess.suhac.eu/api/auth/callback
      KEYCLOAK_JWKS_CACHE_TTL: "3600"
      AWS_ENDPOINT: http://shared-services_garage:3900
      GARAGE_REGION: garage
      GARAGE_ADMIN_URL: http://shared-services_garage:3903
      # Hyphen, not underscore: Garage enforces S3 bucket-naming rules,
      # which reject underscores — a Garage-only exception to this repo's
      # usual underscore convention (see shared-services-stack.yml).
      GARAGE_S3_BUCKET_PREFIX: staging-princess
      GARAGE_TEMPLATES_BUCKET: princess-templates
      ONLYOFFICE_URL: http://shared-services_onlyoffice
      # See princess-backend-fpm's comment above re: ONLYOFFICE_PUBLIC_URL/
      # ONLYOFFICE_CALLBACK_BASE_URL and QDRANT_*/ZINC_* — same caveats apply.
      QDRANT_URL: http://shared-services_qdrant:6333
      QDRANT_COLLECTION_PREFIX: staging_princess
      ZINC_URL: http://shared-services_zincsearch:4080
      ZINC_INDEX_PREFIX: staging_princess
      ZINC_USER: admin
    secrets:
      - princess_app_key_staging
      - princess_db_password
      - princess_test_keycloak_client_secret
      - princess_garage_key_id
      - princess_garage_secret_key
      - garage_admin_token
      - onlyoffice_jwt_secret
      - zincsearch_admin_password
    # No healthcheck: see princess-backend-fpm's comment above — their
    # image has no /bin/bash, and this exact test killed this service
    # live before the fix was applied here too.
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 320M
      restart_policy:
        condition: on-failure
        delay: 10s
      placement:
        constraints:
          - node.role == manager

  princess-frontend:
    image: registry.suhac.eu/suhacb/princess_frontend:latest
    networks:
      - public-ingress
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 64M
      restart_policy:
        condition: on-failure
        delay: 10s
      placement:
        constraints:
          - node.role == manager

  princess-frontend-staging:
    image: registry.suhac.eu/suhacb/princess_frontend:latest
    networks:
      - public-ingress
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 64M
      restart_policy:
        condition: on-failure
        delay: 10s
      placement:
        constraints:
          - node.role == manager
