# Catches requests that don't match any configured hostname (e.g. the
# container healthcheck hitting http://localhost, where Host won't match
# keycloak.suhac.eu etc.). Every other *.conf in this directory can just
# `listen 80;` / `listen 443 ssl;` without worrying about which one is
# "default" for unmatched Host headers.
server {
    listen 80 default_server;
    server_name _;

    location /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location / {
        return 404;
    }
}
