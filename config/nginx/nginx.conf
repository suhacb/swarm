worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Don't leak the nginx version in the Server header or default error
    # pages — no reason to hand a would-be attacker a version to look up
    # known CVEs for.
    server_tokens off;

    sendfile   on;
    keepalive_timeout 65;

    client_max_body_size 50m;

    # Keycloak (especially the admin console) sends larger headers/cookies
    # than nginx's defaults expect.
    proxy_buffer_size       128k;
    proxy_buffers           4 256k;
    proxy_busy_buffers_size 256k;

    include /etc/nginx/conf.d/*.conf;
}
