# Qdrant/ZincSearch/Garage admin UIs, gated through oauth2-proxy (see
# stacks/shared-services-stack.yml). ONE shared oauth2-proxy instance
# authenticates against Keycloak (suhacb realm); each vhost enforces its
# OWN required group via oauth2-proxy's `allowed_groups` query-param
# mechanism — deliberately per-tool, not one shared group, so a
# compromised credential for one tool doesn't expose the other two.
#
# Two dead ends hit getting here, both confirmed live, worth knowing
# before touching this again:
#   1. An nginx `if ($upstream_http_x_auth_request_groups != ...)` check
#      after auth_request_set silently 403'd EVERY request, including
#      authenticated ones. Root cause: nginx's `if` runs in the rewrite
#      phase, which always executes BEFORE auth_request's access phase
#      in the same location, so the variable is still empty when `if`
#      reads it, regardless of where `if` is written relative to
#      auth_request in the config.
#   2. `auth_request /oauth2/auth?allowed_groups=x;` (query string
#      inline in the auth_request directive) doesn't work either —
#      auth_request's argument isn't parsed as path+query the way
#      proxy_pass/rewrite targets are; it percent-encodes the literal
#      `?` into the request path (`/oauth2/auth%3Fallowed_groups=x`),
#      which oauth2-proxy correctly treats as "no allowed_groups filter"
#      and just checks authentication, not authorization.
# The fix: put the `allowed_groups` query string directly on THIS
# location's own proxy_pass target instead, one dedicated `/oauth2/auth`
# location per vhost (not shared via the snippet) — oauth2-proxy's
# authOnlyAuthorize (confirmed by reading oauthproxy.go) then does the
# real group check server-side and returns 403 for authenticated-but-
# wrong-group, 401 for unauthenticated, exactly the semantics needed
# without any nginx-side conditional logic.
server {
    listen 443 ssl;
    http2 on;
    server_name qdrant.suhac.eu;

    ssl_certificate     /etc/letsencrypt/live/suhac.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/suhac.eu/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    resolver 127.0.0.11 valid=30s;
    include /etc/nginx/snippets/hardening.conf;
    include /etc/nginx/snippets/oauth2-proxy.conf;

    limit_req zone=general burst=20 nodelay;

    location = /oauth2/auth {
        internal;
        set $upstream_oauth2_proxy oauth2-proxy:4180;
        proxy_pass http://$upstream_oauth2_proxy/oauth2/auth?allowed_groups=qdrant-admins;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Uri   $request_uri;
    }

    location / {
        auth_request /oauth2/auth;
        error_page 401 = /oauth2/sign_in;

        auth_request_set $user $upstream_http_x_auth_request_user;
        proxy_set_header X-User $user;

        set $upstream_qdrant qdrant:6333;
        proxy_pass http://$upstream_qdrant;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

