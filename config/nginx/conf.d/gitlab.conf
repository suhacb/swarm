server {
    listen 443 ssl;
    http2 on;
    server_name gitlab.suhac.eu;

    ssl_certificate     /etc/letsencrypt/live/suhac.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/suhac.eu/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # GitLab pushes/pulls can be much larger than the 50m global default.
    client_max_body_size 500m;

    resolver 127.0.0.11 valid=30s;

    # NOT including snippets/hardening.conf here: its dotfile-deny rule is
    # meant to stop nginx serving sensitive files out of a local docroot,
    # which doesn't apply to a pure reverse proxy like this — GitLab has no
    # local docroot for nginx to protect. It actively breaks real GitLab
    # functionality instead: repo files that start with a dot (.gitlab-ci.yml,
    # .gitignore, .env.example, etc.) are legitimately served by GitLab's own
    # web UI and API (blob view, raw file API, CI lint) as their own path
    # segment, e.g. /repository/files/.gitlab-ci.yml/raw — exactly the kind
    # of request this rule matches and 403s.

    # Generous burst — a real page load fires off many asset/API requests
    # in quick succession; this is about blunting sustained abuse (bots,
    # scanners) against a box with no memory to spare, not normal use.
    limit_req zone=general burst=20 nodelay;

    location / {
        set $upstream_gitlab gitlab:80;
        proxy_pass http://$upstream_gitlab;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  443;
        # GitLab's web UI (esp. large diffs/pipelines) needs longer than
        # nginx's 60s default before it considers the backend unresponsive.
        proxy_read_timeout 300s;
    }
}
