server {
    listen 443 ssl;
    http2 on;
    server_name onlyoffice.suhac.eu;

    ssl_certificate     /etc/letsencrypt/live/suhac.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/suhac.eu/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Document uploads/conversions can exceed the 50m global default.
    client_max_body_size 100m;

    resolver 127.0.0.11 valid=30s;

    include /etc/nginx/snippets/hardening.conf;

    limit_req zone=onlyoffice burst=60 nodelay;

    location / {
        set $upstream_onlyoffice shared-services_onlyoffice:80;
        proxy_pass http://$upstream_onlyoffice;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  443;
        # WebSocket support for real-time collaborative editing — see
        # nginx.conf's $connection_upgrade map.
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        # Collaborative sessions can sit idle between keystrokes; nginx's
        # 60s default would drop the WebSocket mid-session.
        proxy_read_timeout 3600s;
    }
}
