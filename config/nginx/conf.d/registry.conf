server {
    listen 443 ssl;
    http2 on;
    server_name registry.suhac.eu;

    ssl_certificate     /etc/letsencrypt/live/suhac.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/suhac.eu/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Docker image layer pushes/pulls can be much larger than the 50m global
    # default — same reasoning as gitlab.conf's client_max_body_size.
    client_max_body_size 500m;

    resolver 127.0.0.11 valid=30s;

    include /etc/nginx/snippets/hardening.conf;

    # See nginx.conf's zone definition for why this isn't the shared
    # "general" (human-traffic-sized) zone every other vhost uses.
    limit_req zone=registry burst=100 nodelay;

    location / {
        set $upstream_registry gitlab:5050;
        proxy_pass http://$upstream_registry;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  443;
        # Large layer uploads/downloads need more than nginx's 60s default.
        proxy_read_timeout 300s;
    }
}
