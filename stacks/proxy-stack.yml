networks:
  public-ingress:
    external: true
  ci-mesh:
    external: true

services:
  nginx:
    image: nginx:1.27-alpine
    networks:
      public-ingress:
        # Lets any OTHER container on this network (e.g. GitLab, for its
        # OIDC calls to Keycloak) reach these hostnames directly at nginx,
        # over real TLS with the real cert, routed exactly like external
        # traffic — instead of hitting a backend container's internal IP
        # directly, which would see a different Host and have no TLS at
        # all. Add a new entry here for every service's public hostname.
        aliases:
          - keycloak.suhac.eu
          - keycloak.lan.suhac.eu
          - gitlab.suhac.eu
          - gitlab.lan.suhac.eu
      ci-mesh:
        # Same alias trick, extended to CI job containers: GitLab Runner's
        # Docker executor creates job containers as plain `docker run`
        # sibling containers (not Swarm services) attached to ci-mesh only —
        # they never join public-ingress, so they'd otherwise have no way to
        # reach gitlab.suhac.eu (git clone, job traces) or registry.suhac.eu
        # (image push/pull) at all. GitLab and the registry themselves don't
        # need to join ci-mesh for this — nginx already resolves gitlab:80
        # and gitlab:5050 via its own public-ingress membership regardless
        # of which network the inbound request arrived on.
        aliases:
          - gitlab.suhac.eu
          - registry.suhac.eu
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Bind-mounted (not Swarm configs) so editing files under config/nginx/
      # on the repo checkout takes effect on `docker service update --force`
      # without juggling versioned config objects.
      - /Users/blazsuhac/Documents/projects/swarm/config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /Users/blazsuhac/Documents/projects/swarm/config/nginx/conf.d:/etc/nginx/conf.d:ro
      - /Users/blazsuhac/Documents/projects/swarm/config/nginx/snippets:/etc/nginx/snippets:ro
      # NOT /etc/letsencrypt directly: Certbot locks live/ and archive/ down
      # to root:wheel 0700, and Docker Desktop's file-sharing bridge runs as
      # the logged-in user, not root — it can't read those paths at any
      # container privilege level. scripts/certbot-deploy-hook.sh keeps this
      # copy in sync with every renewal; see docs/DEPLOY.md.
      - /opt/swarm-data/certs/live/suhac.eu:/etc/letsencrypt/live/suhac.eu:ro
    healthcheck:
      # 127.0.0.1, not localhost: this image's /etc/hosts resolves localhost
      # to ::1 first, but nginx (below) only listens on IPv4 — wget would
      # always get connection refused and Swarm would kill an otherwise-
      # healthy container.
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
      placement:
        constraints:
          - node.role == manager
