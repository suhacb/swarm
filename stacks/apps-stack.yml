# princess: Angular SPA (separate princess_frontend repo, id=75) + Laravel
# API (princess_backend repo, id=42), prod + staging. Real images now exist
# for princess_backend (see docs/DEPLOY.md); princess_frontend's own images
# don't yet, so those two services will still fail-to-pull until that
# repo's own pipeline exists — expected gap, not a bug to chase.
#
# princess_backend ships as TWO images (docker/nginx + docker/php in their
# repo), not one — nginx speaks HTTP, php-fpm speaks FastCGI only. This
# stack therefore has THREE princess_backend-related services per
# environment, not two:
#   - princess-backend(-staging): their nginx image. This is the thing
#     config/nginx/conf.d/princess.conf's `location ^~ /api/` block
#     proxies to, at apps_princess-backend:8080 — their nginx.conf
#     template listens on 8080, not 80 (confirmed live 2026-07-14: a
#     healthcheck AND princess.conf's proxy_pass both hardcoded :80,
#     neither ever reached the container at all despite it running
#     perfectly healthily — see project-nginx-registry-rate-limit memory's
#     sibling incident for the parallel php-fpm healthcheck mistake).
#     public-ingress (swarm Nginx reaches it) + app-mesh (it reaches
#     php-fpm over FastCGI). No app secrets — it's just a reverse proxy,
#     the Laravel app config lives one hop further in.
#   - princess-backend-fpm(-staging): their php image (php-fpm). Purely
#     internal — app-mesh (Keycloak/Garage/Qdrant/ZincSearch, and reached
#     BY the nginx service above) + data-mesh (Postgres). Deliberately
#     NOT on public-ingress: nothing external should ever reach php-fpm
#     directly, and it doesn't speak HTTP anyway.
#   - princess-frontend(-staging): the separate Angular SPA. public-ingress
#     only — the browser talks to it directly, and swarm Nginx's `location
#     /` block proxies to it. Do NOT let princess_backend's own pipeline
#     deploy anything here — this name is reserved for the id=75 repo.
#     (This used to collide: princess_backend's deploy was targeting this
#     exact name with its OWN nginx image before the fix below.)
#
# E2E has no separate deployment: the frontend's E2E suite hits the
# staging backend with an X-E2E-Token header, and the app's own
# E2eAuth middleware (app/Http/Middleware/E2eAuth.php) transparently
# switches the request onto the isolated e2e_princess database.
#
# Tracked in https://github.com/suhacb/swarm/issues/8 (supersedes #5).
networks:
  public-ingress:
    external: true
  app-mesh:
    external: true
  data-mesh:
    external: true

secrets:
  princess_db_password:
    external: true
  princess_keycloak_client_secret:
    external: true
  princess_test_keycloak_client_secret:
    external: true
  princess_garage_key_id:
    external: true
  princess_garage_secret_key:
    external: true
  zincsearch_admin_password:
    external: true

services:
  princess-backend:
    # Their nginx image — the HTTP-speaking half. Real registry path
    # (project id=42's own CI pushes here); tag left at :latest as the
    # bootstrap value only — their deploy job overwrites this with an
    # immutable main-<short-sha> tag on every real deploy.
    image: registry.suhac.eu/suhacb/princess_backend/nginx:latest
    networks:
      - public-ingress
      - app-mesh
    environment:
      # Their own nginx.conf needs to fastcgi_pass here — coordinate the
      # exact expected env var name with the princess_backend team if
      # their config doesn't already read this one.
      PHP_FPM_HOST: princess-backend-fpm:9000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 64M
      restart_policy:
        condition: on-failure
        delay: 10s
      placement:
        constraints:
          - node.role == manager

  princess-backend-fpm:
    # Their php-fpm image — internal only, no public-ingress. Everything
    # that used to live on the combined "princess-backend" service (DB,
    # OIDC, Garage, Qdrant, Zinc) belongs here now, not on the nginx half.
    image: registry.suhac.eu/suhacb/princess_backend/php:latest
    networks:
      - app-mesh
      - data-mesh
    environment:
      APP_ENV: production
      DB_CONNECTION: pgsql
      DB_HOST: data_postgres
      DB_PORT: "5432"
      DB_DATABASE: princess
      DB_USERNAME: princess
      OIDC_ISSUER: https://keycloak.suhac.eu/realms/suhacb
      OIDC_CLIENT_ID: princess-client
      GARAGE_ENDPOINT: http://shared-services_garage:3900
      GARAGE_BUCKET: princess
      QDRANT_URL: http://shared-services_qdrant:6333
      QDRANT_COLLECTION_PREFIX: princess
      ZINC_URL: http://shared-services_zincsearch:4080
      ZINC_INDEX_PREFIX: princess
      ZINC_USER: admin
    secrets:
      - princess_db_password
      - princess_keycloak_client_secret
      - princess_garage_key_id
      - princess_garage_secret_key
      - zincsearch_admin_password
    # No healthcheck: confirmed live their image has no /bin/bash (Alpine-
    # based), and a guessed-wrong healthcheck actively caused Swarm to kill
    # and reschedule an otherwise-healthy, ready-to-serve php-fpm process 5
    # times in ~90s (5 straight OCI exec failures -> marked unhealthy ->
    # rescheduled). Same "no shell/tools to probe with" situation as
    # Garage/ZincSearch elsewhere in this repo — restart_policy below
    # covers a genuine crash without a healthcheck actively fighting it.
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 448M
      restart_policy:
        condition: on-failure
        delay: 10s
      placement:
        constraints:
          - node.role == manager

  princess-backend-staging:
    image: registry.suhac.eu/suhacb/princess_backend/nginx:latest
    networks:
      - public-ingress
      - app-mesh
    environment:
      PHP_FPM_HOST: princess-backend-fpm-staging:9000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 64M
      restart_policy:
        condition: on-failure
        delay: 10s
      placement:
        constraints:
          - node.role == manager

  princess-backend-fpm-staging:
    image: registry.suhac.eu/suhacb/princess_backend/php:latest
    networks:
      - app-mesh
      - data-mesh
    environment:
      APP_ENV: staging
      DB_CONNECTION: pgsql
      DB_HOST: data_postgres
      DB_PORT: "5432"
      DB_DATABASE: stage_princess
      DB_USERNAME: princess
      OIDC_ISSUER: https://keycloak.suhac.eu/realms/princess-test
      OIDC_CLIENT_ID: princess-client
      GARAGE_ENDPOINT: http://shared-services_garage:3900
      # Hyphen, not underscore: Garage enforces S3 bucket-naming rules,
      # which reject underscores — a Garage-only exception to this repo's
      # usual underscore convention (see shared-services-stack.yml).
      GARAGE_BUCKET: staging-princess
      QDRANT_URL: http://shared-services_qdrant:6333
      QDRANT_COLLECTION_PREFIX: staging_princess
      ZINC_URL: http://shared-services_zincsearch:4080
      ZINC_INDEX_PREFIX: staging_princess
      ZINC_USER: admin
    secrets:
      - princess_db_password
      - princess_test_keycloak_client_secret
      - princess_garage_key_id
      - princess_garage_secret_key
      - zincsearch_admin_password
    # No healthcheck: see princess-backend-fpm's comment above — their
    # image has no /bin/bash, and this exact test killed this service
    # live before the fix was applied here too.
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 320M
      restart_policy:
        condition: on-failure
        delay: 10s
      placement:
        constraints:
          - node.role == manager

  princess-frontend:
    image: registry.suhac.eu/suhacb/princess_frontend:latest
    networks:
      - public-ingress
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 64M
      restart_policy:
        condition: on-failure
        delay: 10s
      placement:
        constraints:
          - node.role == manager

  princess-frontend-staging:
    image: registry.suhac.eu/suhacb/princess_frontend:latest
    networks:
      - public-ingress
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 64M
      restart_policy:
        condition: on-failure
        delay: 10s
      placement:
        constraints:
          - node.role == manager
