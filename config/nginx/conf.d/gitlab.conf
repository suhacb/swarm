server {
    listen 443 ssl;
    http2 on;
    server_name gitlab.suhac.eu gitlab.lan.suhac.eu;

    ssl_certificate     /etc/letsencrypt/live/suhac.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/suhac.eu/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # GitLab pushes/pulls can be much larger than the 50m global default.
    client_max_body_size 500m;

    resolver 127.0.0.11 valid=30s;

    include /etc/nginx/snippets/hardening.conf;

    location / {
        set $upstream_gitlab gitlab:80;
        proxy_pass http://$upstream_gitlab;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  443;
        # GitLab's web UI (esp. large diffs/pipelines) needs longer than
        # nginx's 60s default before it considers the backend unresponsive.
        proxy_read_timeout 300s;
    }
}
