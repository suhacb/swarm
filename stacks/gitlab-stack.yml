# Real GitLab CE (not Gitea — see issue #2 for why this changed from the
# original plan). Bundles its own Postgres/Redis internally rather than the
# shared Postgres server, to avoid GitLab's specific extension/version
# requirements colliding with what other services expect from it.
#
# gitlab.rb itself is NOT bind-mounted from this repo: GitLab writes other
# files into /etc/gitlab as it runs (secrets, SSH host keys), so the config
# lives on the persistent host directory instead. See
# config/gitlab/gitlab.rb.template and docs/DEPLOY.md.
#
# Named Docker volumes, not bind mounts (migrated 2026-07-13): Docker
# Desktop for Mac's virtiofs bind-mount bridge caused recurring flakiness
# under GitLab's write load (see docs/DEPLOY.md). Named volumes live inside
# Docker Desktop's own VM disk and never cross that bridge. The migration
# uncovered a real, separate bug worth knowing if this is ever redone:
# GitLab's data already contained root-owned files scattered through every
# service's data/log directories (accumulated over time, silently tolerated
# because virtiofs never enforced real Unix permissions on the old bind
# mount). Named volumes DO enforce real permissions, so Postgres/Redis/
# registry/Puma all failed to start until every subdirectory was
# recursively re-chowned to its owner's own UID. gitlab-ctl reconfigure
# does NOT fix this itself — it only sets ownership on paths it creates,
# never recurses into a pre-existing populated directory.
networks:
  public-ingress:
    external: true

volumes:
  gitlab_data:
    external: true
  gitlab_logs:
    external: true
  gitlab_config:
    external: true

secrets:
  gitlab_root_password:
    external: true
  gitlab_oidc_client_secret:
    external: true

services:
  gitlab:
    image: gitlab/gitlab-ce:19.1.2-ce.0
    networks:
      - public-ingress
    environment:
      GITLAB_ROOT_EMAIL: root@suhac.eu
    secrets:
      - gitlab_root_password
      - gitlab_oidc_client_secret
    # GITLAB_ROOT_PASSWORD only has an effect on the very first reconfigure
    # of an empty /etc/gitlab — same one-shot bootstrap semantics as
    # Keycloak's admin env vars. Omnibus doesn't support a *_FILE
    # convention for it, hence the same wrapper trick used for Keycloak.
    entrypoint: ["/bin/bash", "-c"]
    command:
      - >
        export GITLAB_ROOT_PASSWORD="$$(cat /run/secrets/gitlab_root_password)" &&
        exec /assets/init-container
    volumes:
      - gitlab_config:/etc/gitlab
      - gitlab_logs:/var/log/gitlab
      - gitlab_data:/var/opt/gitlab
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/-/liveness"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 5000M
      restart_policy:
        condition: on-failure
        delay: 15s
      placement:
        constraints:
          - node.role == manager
