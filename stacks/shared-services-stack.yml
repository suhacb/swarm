# Shared, swarm-level Qdrant/ZincSearch/Garage — run once, used by any
# service that needs a vector index, full-text index, or S3-compatible
# object storage, rather than a dedicated instance each (same reasoning as
# the shared Postgres server in data-stack.yml).
#
# No public hostnames, no admin UIs exposed at all — app-mesh (internal
# backends) plus ci-mesh (E2E CI job containers, see below) only. A
# Keycloak+oauth2-proxy gate for Qdrant/ZincSearch/garage-webui's admin
# UIs was built, tested, and then deliberately reverted: LAN-only access
# (the original ask) is impossible on this Docker Desktop for Mac host
# regardless of what auth sits behind it (its VM-boundary NAT rewrites
# every client's source IP before any container sees it — this is a
# network-layer fact, not an auth-layer one, so removing Keycloak doesn't
# sidestep it either). Once "reachable from the whole internet, gated by
# login" was the only real option, native logins turned out not to exist
# for two of the three services (Qdrant only supports an API key, not an
# interactive login; garage-webui has no built-in auth at all) — so the
# simplest, actually-secure answer was to just not expose any of them
# externally: internal network membership alone (never joining
# public-ingress) is a real boundary here, unlike LAN-vs-WAN IP detection.
# garage-webui itself was removed entirely as a result — no external
# access point left to justify running it. Princess (or any other internal
# backend) still reaches all three directly via app-mesh/service name,
# unaffected by any of this.
#
# ci-mesh membership added separately and later: the princess E2E test
# suite is fully GitLab-CI-driven (not a swarm stack — deliberately does
# NOT touch the always-on staging deployment, which stays a stable
# human-QA environment) and reuses these same shared services for its
# e2e_-prefixed data. Its job containers are plain `docker run` siblings,
# not Swarm services, so app-mesh (non-attachable) is structurally
# unreachable for them — ci-mesh is the swarm's one attachable network,
# hence these three joining it too. See docs/DEPLOY.md's Phase 3 section.
#
# Naming convention (enforced by the CONSUMING app's own config, not by
# anything server-side except Garage's bucket/key scoping — see
# scripts/setup-garage.sh): production names are bare, every other
# environment is prefixed with its env name. For princess specifically:
#   - Garage buckets: princess, staging-princess, e2e-princess, test-princess
#     (HYPHENS — confirmed live that Garage enforces S3 bucket-naming
#     rules, which reject underscores; every other name below is
#     unaffected and keeps this repo's usual underscore convention)
#   - Qdrant collections: princess_*, staging_princess_*, e2e_princess_*, test_princess_*
#   - ZincSearch indices: same prefix pattern as Qdrant
#
# NEITHER zincsearch NOR garage's images have a shell (confirmed live —
# both are minimal Go/Rust static-binary images, no /bin/sh, no busybox).
# That rules out the entrypoint-wrapper trick used elsewhere in this repo
# (Keycloak/GitLab) to turn a mounted Docker secret file into an env var,
# AND rules out CMD-SHELL healthchecks (which also need a shell). See
# docs/DEPLOY.md's Phase 3 section for how each service's credentials are
# actually delivered instead.
#
# onlyoffice: app-mesh ONLY, deliberately no public-ingress — accessible
# from inside the swarm only (princess-backend calling it directly via
# service name), no public hostname. Runs as root by default (has bash,
# unlike Qdrant/ZincSearch/Garage above) — official vendor guidance is
# 4GB RAM; given this box's tight budget, deliberately under-provisioned
# to 1.5GB and will need watching under real document-conversion load,
# not a full sizing guarantee.
#
# Tracked in https://github.com/suhacb/swarm/issues/8 (supersedes #4).
networks:
  app-mesh:
    external: true
  ci-mesh:
    external: true

secrets:
  zincsearch_admin_password:
    external: true
  onlyoffice_jwt_secret:
    external: true

services:
  qdrant:
    image: qdrant/qdrant:v1.13.3
    networks:
      - app-mesh
      # Also ci-mesh — E2E CI job containers (plain `docker run` sibling
      # containers, not Swarm services, so app-mesh is structurally
      # unreachable) connect directly for the shared e2e_ collections.
      # See docs/DEPLOY.md's Phase 3 section.
      - ci-mesh
    volumes:
      - /opt/swarm-data/qdrant:/qdrant/storage
    healthcheck:
      # This image's /bin/sh is NOT bash (confirmed live — dash-like, no
      # /dev/tcp support: "Directory nonexistent"). bash does exist, just
      # at /usr/bin/bash — invoke it explicitly via CMD, not CMD-SHELL
      # (which always wraps in /bin/sh).
      test: ["CMD", "/usr/bin/bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/6333 && printf 'GET /readyz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 384M
      restart_policy:
        condition: on-failure
        delay: 10s
      placement:
        constraints:
          - node.role == manager

  zincsearch:
    image: public.ecr.aws/zinclabs/zincsearch:0.4.10
    networks:
      - app-mesh
      # Also ci-mesh — same reasoning as qdrant above, for the shared
      # e2e_ indices.
      - ci-mesh
    environment:
      ZINC_FIRST_ADMIN_USER: admin
      # No shell in this image to translate a mounted Docker secret file
      # into an env var, and ZincSearch has no *_FILE-style convention for
      # this setting — so the value comes from docker-stack-deploy's own
      # ${VAR} interpolation (confirmed live: it substitutes from the
      # deploying shell's environment, same as docker-compose) rather than
      # a Docker secret. See docs/DEPLOY.md for the export-then-deploy step.
      ZINC_FIRST_ADMIN_PASSWORD: ${ZINC_FIRST_ADMIN_PASSWORD}
      ZINC_DATA_PATH: /data
    volumes:
      - /opt/swarm-data/zincsearch:/data
    # No healthcheck: no shell and no curl/wget/nc inside this image to
    # probe with. restart_policy below still recovers a genuine crash.
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 10s
      placement:
        constraints:
          - node.role == manager

  garage:
    image: dxflrs/garage:v2.3.0
    networks:
      - app-mesh
      # Also ci-mesh — same reasoning as qdrant above, for the shared
      # e2e-princess bucket (S3 API + admin API, ports 3900/3903).
      - ci-mesh
    entrypoint: ["/garage"]
    command: ["server", "--single-node"]
    volumes:
      # A fully-rendered config, not a template with runtime substitution
      # (no shell in this image to do that) — generated ONCE on the host
      # from config/garage/garage.toml.template and never committed, same
      # "copied, not bind-mounted, secrets live on the host only" pattern
      # already used for gitlab.rb. See docs/DEPLOY.md's Phase 3 section.
      - /opt/swarm-data/garage/garage.toml:/etc/garage.toml:ro
      - /opt/swarm-data/garage/meta:/var/lib/garage/meta
      - /opt/swarm-data/garage/data:/var/lib/garage/data
    # No healthcheck: no shell/tools inside this image to probe with.
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 10s
      placement:
        constraints:
          - node.role == manager

  onlyoffice:
    image: onlyoffice/documentserver:latest
    networks:
      - app-mesh
    secrets:
      - onlyoffice_jwt_secret
    environment:
      JWT_ENABLED: "true"
    # Has a real shell (confirmed live) and runs as root by default,
    # unlike Qdrant/ZincSearch/Garage above — the ordinary entrypoint-
    # wrapper pattern applies here with no workaround needed.
    entrypoint: ["/bin/bash", "-c"]
    command:
      - >
        export JWT_SECRET="$$(cat /run/secrets/onlyoffice_jwt_secret)" &&
        exec /app/ds/run-document-server.sh
    volumes:
      - /opt/swarm-data/onlyoffice/logs:/var/log/onlyoffice
      - /opt/swarm-data/onlyoffice/data:/var/www/onlyoffice/Data
      - /opt/swarm-data/onlyoffice/lib:/var/lib/onlyoffice
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          # Vendor-recommended minimum is 4GB; deliberately under-
          # provisioned given this box's tight overall budget — see the
          # header comment above. Watch docker stats under real load.
          memory: 1536M
      restart_policy:
        condition: on-failure
        delay: 15s
      placement:
        constraints:
          - node.role == manager
