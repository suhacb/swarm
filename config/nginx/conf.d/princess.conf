# Path-priority routing instead of a separate api.* subdomain or a second
# reverse-proxy layer (Traefik) — see docs/DEPLOY.md's Phase 3 section for
# why. `location ^~ /api/` is a prefix match that wins over the plain
# `location /` catch-all without needing regex-priority tricks, giving the
# same "the SPA never sees /api/* traffic" property a dedicated router
# would, using only what's already here.
server {
    listen 443 ssl;
    http2 on;
    server_name princess.suhac.eu;

    ssl_certificate     /etc/letsencrypt/live/suhac.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/suhac.eu/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    resolver 127.0.0.11 valid=30s;

    include /etc/nginx/snippets/hardening.conf;

    limit_req zone=princess burst=100 nodelay;

    location ^~ /api/ {
        set $upstream_princess_backend apps_princess-backend:8080;
        proxy_pass http://$upstream_princess_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  443;
    }

    location / {
        # The Angular container's own web server handles SPA history-mode
        # fallback (try_files ... /index.html) itself — this is a plain
        # proxy, no special SPA logic needed at this layer.
        set $upstream_princess_frontend apps_princess-frontend:8080;
        proxy_pass http://$upstream_princess_frontend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  443;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name staging.princess.suhac.eu;

    ssl_certificate     /etc/letsencrypt/live/suhac.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/suhac.eu/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    resolver 127.0.0.11 valid=30s;

    include /etc/nginx/snippets/hardening.conf;

    limit_req zone=princess burst=100 nodelay;

    # Also serves the frontend's E2E suite: it hits this same staging
    # deployment with an X-E2E-Token header, which the backend's own
    # E2eAuth middleware uses to transparently switch onto the isolated
    # e2e_princess database — no separate e2e.* hostname/deployment needed.
    location ^~ /api/ {
        set $upstream_princess_backend_staging apps_princess-backend-staging:8080;
        proxy_pass http://$upstream_princess_backend_staging;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  443;
    }

    location / {
        set $upstream_princess_frontend_staging apps_princess-frontend-staging:8080;
        proxy_pass http://$upstream_princess_frontend_staging;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  443;
    }
}
