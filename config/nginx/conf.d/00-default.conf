# Catches all HTTP (port 80) traffic, matched or not, and sends it to
# HTTPS — this is the ONE place that redirect lives. Every other *.conf in
# this directory only needs a `listen 443 ssl;` block; it doesn't need to
# repeat its own 80->443 redirect.
server {
    listen 80 default_server;
    server_name _;

    # Exempted so the container healthcheck (plain HTTP, Host: localhost)
    # doesn't get redirected into a TLS handshake it isn't doing.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
