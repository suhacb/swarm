worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Don't leak the nginx version in the Server header or default error
    # pages — no reason to hand a would-be attacker a version to look up
    # known CVEs for.
    server_tokens off;

    sendfile   on;
    keepalive_timeout 65;

    client_max_body_size 50m;

    # Keycloak (especially the admin console) sends larger headers/cookies
    # than nginx's defaults expect.
    proxy_buffer_size       128k;
    proxy_buffers           4 256k;
    proxy_busy_buffers_size 256k;

    # Rate limiting. "general" protects GitLab's tight memory budget from
    # bot/scanner traffic — the box has no room to spare for a flood of
    # cheap requests. "auth" is tighter, applied only to Keycloak's actual
    # login form submission, as defense in depth alongside its own
    # brute-force lockout (scripts/harden-keycloak-brute-force.sh).
    # Real firewall/network-level protection is out of scope here by
    # design — that's handled upstream of this box.
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=2r/s;

    include /etc/nginx/conf.d/*.conf;
}
