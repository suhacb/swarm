# Included from every vhost's server block (not conf.d — files there are
# each expected to be a complete server block, this is meant to be included
# from within one). Denies dotfiles (.git, .env, .htaccess, etc.) that have
# no business being served by any of these backends. Excludes /.well-known/,
# which is a legitimate standard path (OIDC discovery, ACME challenges) that
# happens to start with a dot too.
location ~ /\.(?!well-known) {
    deny all;
    access_log off;
    log_not_found off;
}
