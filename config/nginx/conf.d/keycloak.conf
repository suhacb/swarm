server {
    listen 443 ssl;
    http2 on;
    server_name keycloak.suhac.eu keycloak.lan.suhac.eu;

    ssl_certificate     /etc/letsencrypt/live/suhac.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/suhac.eu/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Resolve the upstream per-request via Docker's embedded DNS instead of
    # once at nginx startup/reload. Swarm gives no guaranteed start order, so
    # a static `proxy_pass http://keycloak:8080` would make nginx refuse to
    # start at all if Keycloak isn't resolvable yet.
    resolver 127.0.0.11 valid=30s;

    include /etc/nginx/snippets/hardening.conf;

    # Generous burst — a real browser loading the admin console fires off
    # many requests at once; this is about blunting sustained abuse, not
    # normal page loads.
    limit_req zone=general burst=20 nodelay;

    location / {
        set $upstream_keycloak keycloak:8080;
        proxy_pass http://$upstream_keycloak;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  443;
    }

    # The actual login form submission — tighter limit here as defense in
    # depth alongside Keycloak's own brute-force lockout.
    location ~ ^/realms/[^/]+/login-actions/authenticate {
        limit_req zone=auth burst=5 nodelay;
        set $upstream_keycloak keycloak:8080;
        proxy_pass http://$upstream_keycloak;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  443;
    }
}
